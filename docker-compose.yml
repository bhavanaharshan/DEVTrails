version: '3.8'
services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_PASSWORD: neema
    volumes:
      - ./neema-backend/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  backend:
    build: ./neema-backend
    ports:
      - "3001:3001"
    depends_on:
      - db

  frontend:
    build: ./gigshield-frontend
    ports:
      - "3000:3000"
    stdin_open: true # Required for React

  trigger-engine:
    build: ./DEVTrails-api_core_logic/api_core_logic
    ports:
      - "3002:3002" # twilio
    depends_on:
      - backend