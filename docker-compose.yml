version: '3.8'
services:
  db:
    image: postgres
    environment:
      POSTGRES_PASSWORD: neema
    volumes:
      - ./neema-backend/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  backend:
    build: ./neema-backend
    ports:
      - "3001:3001"
    depends_on:
      - db

  frontend:
    build: ./neema-frontend
    ports:
      - "3000:3000"
    stdin_open: true # Required for React