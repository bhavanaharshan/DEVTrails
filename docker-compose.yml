services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_PASSWORD: neema
    volumes:
      - ./neema-backend/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  backend:
    build: ./neema-backend
    ports:
      - "3001:3001"
    depends_on:
      - db
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build: ./gigshield-frontend
    ports:
      - "5173:5173" # ✅ Change this from 3000:3000 to match your Vite output
    stdin_open: true
    env_file:
      - ./gigshield-frontend/.env
    tty: true
    extra_hosts:
      - "host.docker.internal:host-gateway"

  trigger-engine:
    build: ./DEVTrails-api_core_logic/api_core_logic
    ports:
      - "3002:3002"
    depends_on:
      - backend
    extra_hosts:
      - "host.docker.internal:host-gateway"

# ✅ ML Engine remains removed because you are running it locally in a venv.