services:
  - type: web
    name: gigshield-ml-engine
    env: python

    rootDir: DEVTrails-ml-engine   # 🔥 VERY IMPORTANT

    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: PYTHON_VERSION        # 🔥 THIS FIXES YOUR ERROR
        value: 3.10.13

      - key: GNEWS_API_KEY
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false